name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON schemas parse
        run: python scripts/_minijsonschema.py

      - name: Validate skills (format + references + schema)
        run: python scripts/validate_skills.py

      - name: Validate specs
        run: python scripts/validate_specs.py

      - name: Validate Markdown references
        run: python scripts/validate_references.py

      - name: Trigger eval suite (static checks)
        run: python scripts/run_trigger_evals.py

      - name: Workflow eval suite (static checks)
        run: python scripts/run_workflow_evals.py

      - name: Secret scan
        run: python scripts/scan_secrets.py

      - name: Hook tests (secret / protected-file guards)
        run: python scripts/test_hooks.py

      - name: Output eval suite (static checks)
        run: python scripts/run_output_evals.py

      - name: Installer dry-run (codex + claude)
        run: python scripts/install.py --targets codex claude --scope repo --dry-run

      - name: Adapter sync drift check
        run: |
          python scripts/install.py --targets codex claude --scope repo
          python scripts/sync_skills.py --check --targets codex claude
