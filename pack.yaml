name: production-ai-sdd-skill-pack
version: 1.0.0
maturity: production-grade   # meets Master Spec Definition of Done (sec. 25); live-agent scoring is a tracked follow-up
agent_skills_spec: "1"
minimum_python: "3.11"
license: MIT
description: >-
  Spec-driven workflows, production architecture reviews, AI contracts, evaluations,
  reliability gates, and human-control patterns for Codex, Claude Code, and Agent
  Skills-compatible coding agents.
repository: https://github.com/danieltsai0423/Production-AI-SDD-Skill-Pack
homepage: https://github.com/danieltsai0423/Production-AI-SDD-Skill-Pack
supported_agents:
  - codex
  - claude-code
install:
  strategy: copy
  script: scripts/install.py
  manifest: .pai-sdd-install-manifest.json
  targets:
    codex: .agents/skills
    claude: .claude/skills
skills:
  - pai-sdd-orchestrator
  - pai-sdd-discovery
  - pai-sdd-specify
  - pai-sdd-clarify
  - pai-sdd-plan
  - pai-sdd-tasking
  - pai-sdd-implement
  - pai-sdd-verify
  - pai-sdd-change
  - pai-sdd-close
  - pai-ai-architecture-review
  - pai-ai-contracts
  - pai-reliability-review
  - pai-security-privacy-review
  - pai-ai-evaluation
  - pai-release-readiness
  - pai-incident-postmortem
profiles:
  - conversational-ai
  - rag-knowledge-system
  - agent-tool-use
  - workflow-automation
  - generative-content
  - realtime-voice
  - document-intelligence
  - ml-inference-service
  - multi-tenant-ai-saas
components:
  schemas: schemas/
  hooks: hooks/
  evals: evals/
  examples: examples/
  docs: docs/
